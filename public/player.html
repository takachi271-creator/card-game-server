<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:12px;
}

h2{
  text-align:center;
}

.card{
  background:#1c1c1c;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
  margin-top:8px;
}

input{
  width:100%;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin-top:6px;
  box-sizing:border-box; /* ⭐ はみ出し防止 */
}

#playerList div{
  background:#1a1a1a;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<h2 id="titleName">プレイヤー</h2>

<!-- ロビー -->
<div id="lobby" class="container">
  <input id="playerName" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<!-- ゲーム -->
<div id="game" class="container" style="display:none;">

<div class="card">
<p>💰 所持金: <span id="money">0</span></p>
<p>🎯 ラウンド: <span id="round">1</span></p>
<p>🔥 POT: <span id="pot">0</span></p>
<p>前回結果: <span id="lastResult">---</span></p>
</div>

<div class="card">
<input id="betAmount" type="number" placeholder="賭け金">
<button onclick="bet()">ベット</button>
<p>⭐ 倍率: <span id="previewMultiplier">1.2</span>x</p>
</div>

<div class="card">
<h3>借金</h3>
<input id="loanAmount" type="number" placeholder="借りたい額">
<button onclick="requestLoan()">借りる</button>
<div id="repayArea"></div>
</div>

<div class="card">
<h3>参加プレイヤー</h3>
<div id="playerList"></div>
</div>

</div>

<script>

let currentName="";
let lastRound=1;
let lastMoney=null;
let loanPopupShown=false;


// ===== 参加 =====
function joinGame(){

 const name=document.getElementById("playerName").value;

 fetch("/join",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })
 .then(()=>{
  currentName=name;

  document.getElementById("titleName").textContent=name;

  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";

  loadState();
 });
}


// ===== BET =====
function bet(){

 const amount=parseInt(
   document.getElementById("betAmount").value);

 fetch("/bet",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 })
 .then(res=>res.text())
 .then(data=>{
   if(data.includes("ベット")){
     alert(data);
     return;
   }
   loadState();
 });
}


// ===== 借金申請 =====
function requestLoan(){

 const amount=parseInt(
   document.getElementById("loanAmount").value);

 fetch("/loan/request",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 })
 .then(res=>res.json())
 .then(data=>{
   alert("貸し手候補: "+data.lender);
 });
}


// ===== 倍率表示 =====
function calculateMultiplier(amount){

  if(amount>=500) return 5.0;
  if(amount>=200) return 3.0;
  if(amount>=150) return 2.0;
  if(amount>=100) return 1.9;
  if(amount>=75) return 1.8;
  if(amount>=50) return 1.5;
  if(amount>=20) return 1.4;

  return 1.2;
}

document.addEventListener("DOMContentLoaded",()=>{

  document.getElementById("betAmount")
  .addEventListener("input",()=>{

    const amount=parseInt(
      document.getElementById("betAmount").value)||0;

    document.getElementById("previewMultiplier")
      .textContent=calculateMultiplier(amount);
  });

});


// ===== 状態更新 =====
function loadState(){

 fetch("/state")
 .then(res=>res.json())
 .then(data=>{

  const money=data.players[currentName];

  document.getElementById("money").textContent=Math.floor(money);
  document.getElementById("round").textContent=data.round;

  let pot=0;
  for(let p in data.bets){ pot+=data.bets[p]; }
  document.getElementById("pot").textContent=pot;

  // 前回結果
  if(lastMoney!==null && data.round!==lastRound){

    const diff=Math.floor(money-lastMoney);
    const result=document.getElementById("lastResult");

    if(diff>0){
      result.textContent="+"+diff;
      result.style.color="lime";
    }else if(diff<0){
      result.textContent=diff;
      result.style.color="red";
    }else{
      result.textContent="±0";
      result.style.color="white";
    }
  }

  lastMoney=money;
  lastRound=data.round;

  // ===== 借金通知 =====
  if(data.loanRequests[currentName] && !loanPopupShown){

    loanPopupShown=true;

    const req=data.loanRequests[currentName];

    const ok=confirm(
      `${req.borrower} が ${req.amount} 借りたい\n貸しますか？`
    );

    fetch(ok?"/loan/accept":"/loan/reject",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:currentName})
    });
  }

  if(!data.loanRequests[currentName]){
    loanPopupShown=false;
  }

  // プレイヤー一覧
  const list=document.getElementById("playerList");
  list.innerHTML="";

  for(let p in data.players){

    const div=document.createElement("div");

    let text=p;
    if(data.bets[p]) text+=" : BET "+data.bets[p];
    else text+=" : 待機中";

    if(p===currentName)
      div.style.border="2px solid #2ecc71";

    div.textContent=text;
    list.appendChild(div);
  }

 });
}

setInterval(loadState,2000);

</script>

</body>
</html>
