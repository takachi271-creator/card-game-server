<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
</head>

<body>

<h2>プレイヤー</h2>

<div id="lobby">
  <input id="playerName" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<div id="game" style="display:none;">

<p>名前: <span id="displayName"></span></p>
<p>所持金: <span id="money">0</span></p>
<p>ラウンド: <span id="round">1</span></p>

<hr>

<input id="betAmount" type="number" placeholder="賭け金">
<button onclick="bet()">ベット</button>

<hr>

<h3>借金</h3>
<input id="loanAmount" type="number" placeholder="借りたい額">
<button onclick="requestLoan()">借りる</button>

<hr>

<div id="playerList"></div>

<pre id="output"></pre>

</div>

<script>

let currentName="";

function joinGame(){
 const name=document.getElementById("playerName").value;

 fetch("/join",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })
 .then(()=>{

  currentName=name;

  document.getElementById("displayName").textContent=name;
  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";

  loadState();
 });
}

function bet(){
 const amount=parseInt(document.getElementById("betAmount").value);

 fetch("/bet",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 }).then(()=>loadState());
}

function requestLoan(){

 const amount=parseInt(document.getElementById("loanAmount").value);

 fetch("/loan/request",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 })
 .then(res=>res.json())
 .then(data=>{
   alert("貸し手候補: "+data.lender);
 });
}

function loadState(){

 fetch("/state")
 .then(res=>res.json())
 .then(data=>{

  document.getElementById("money").textContent =
    Math.floor(data.players[currentName]);

  document.getElementById("round").textContent =
    data.round;

  // ⭐ 借金申請ポップアップ
  if(data.loanRequests[currentName]){
    const req=data.loanRequests[currentName];

    if(confirm(req.borrower+" が "+req.amount+" 借りたい\n貸しますか？")){
      fetch("/loan/accept",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:currentName})
      });
    }else{
      fetch("/loan/reject",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:currentName})
      });
    }
  }

  const list=document.getElementById("playerList");
  list.innerHTML="";

  for(let p in data.players){
    const div=document.createElement("div");

    if(data.bets[p]){
      div.textContent=p+" : BET "+data.bets[p];
    }else{
      div.textContent=p+" : 待機中";
    }

    list.appendChild(div);
  }

 });
}

setInterval(loadState,2000);

</script>

</body>
</html>
