<h1 style="color:red;">テスト</h1>
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
</head>
<body>

  <!--  ロビー -->
  <div id="lobby">
    <h2>ロビー</h2>
    <input id="playerName" placeholder="名前を入力">
    <button onclick="joinGame()">参加する</button>
  </div>

  <!--  ゲーム画面 -->
  <div id="game" style="display:none;">
  </div>
</body>

<br><br>

<input id="betAmount" type="number" placeholder="賭け金">
<button onclick="bet()">ベット</button>

<br><br>

<button onclick="loadState()">状態更新</button>

<pre id="output"></pre>

<script>
function join(){
  const name = document.getElementById("name").value;
  fetch(`/join/${name}`).then(r=>r.json()).then(show);
}

function bet(){
  const name = document.getElementById("name").value;
  const amount = document.getElementById("betAmount").value;
  fetch(`/bet/${name}/${amount}`).then(r=>r.json()).then(show);
}

function loadState(){
  fetch(`/state`).then(r=>r.json()).then(show);
}

function show(data){
  document.getElementById("output").textContent =
  JSON.stringify(data,null,2);
}
function joinGame() {
  const name = document.getElementById("playerName").value;
  if (!name) return alert("名前を入力して");

  document.getElementById("lobby").style.display = "none";
  document.getElementById("game").style.display = "block";
}
</script>
</body>
</html>
