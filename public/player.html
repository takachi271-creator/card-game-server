<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
</head>

<body>

<h2>プレイヤー画面</h2>

<!-- ===== ロビー ===== -->
<div id="lobby">
  <h3>ロビー</h3>
  <input id="playerName" placeholder="名前を入力">
  <button onclick="joinGame()">参加する</button>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="game" style="display:none;">

  <p>プレイヤー: <span id="displayName"></span></p>

  <input id="betAmount" type="number" placeholder="賭け金">
  <button onclick="bet()">ベット</button>

  <br><br>

  <button onclick="loadState()">状態更新</button>

  <pre id="output"></pre>

</div>

<script>

let currentName = "";

// =====================
// 参加（POST /join）
// =====================
function joinGame() {
  const name = document.getElementById("playerName").value;
  if (!name) return alert("名前を入力して");

  fetch("/join", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name })
  })
  .then(res => res.json())
  .then(data => {
    currentName = name;

    document.getElementById("displayName").textContent = name;

    document.getElementById("lobby").style.display = "none";
    document.getElementById("game").style.display = "block";

    loadState();
  });
}


// =====================
// ベット（POST /bet）
// =====================
function bet() {

  const amount = parseInt(
    document.getElementById("betAmount").value
  );

  fetch("/bet", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: currentName,
      amount: amount
    })
  })
  .then(res => res.json())
  .then(data => {
    loadState();
  });
}


// =====================
// 状態取得（GET /state）
// =====================
function loadState() {
  fetch("/state")
    .then(res => res.json())
    .then(data => {
      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);
    });
}

</script>

</body>
</html>
