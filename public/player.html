<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:sans-serif;
}

.container{
  max-width:420px;
  margin:auto;
  padding:12px;
}

.card{
  background:#1c1c1c;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

input,button{
  width:100%;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  box-sizing:border-box;
}

button{
  background:#2ecc71;
  color:white;
}

#playerList div{
  background:#1a1a1a;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<!-- ロビー -->
<div id="lobby">
  <h2>参加</h2>
  <input id="playerName" placeholder="名前">
  <button onclick="joinGame()">参加する</button>
</div>

<!-- ゲーム画面 -->
<div id="game" style="display:none;">

<div class="card">
<p>💰 所持金: <span id="money">0</span></p>
<p>💳 借金: <span id="debt">なし</span></p>
</div>

<!-- ⭐ 信用 -->
<div class="card">
<h3>⭐ 信用ポイント</h3>

<p style="text-align:center;">現在の額</p>

<p id="trustValue"
style="font-size:30px;font-weight:bold;text-align:center;">
0
</p>

<p style="text-align:center;">
通知成功率 :
<span id="trustChance">0%</span>
</p>

<button onclick="exchangeTrust()">
換金（信用30 → 資金回復）
</button>
</div>

<!-- BET -->
<div class="card">
<h3>BET</h3>
<input id="betAmount" type="number" placeholder="賭け金">
<button onclick="bet()">ベット</button>
</div>

<!-- 借金 -->
<div class="card">
<h3>借金</h3>
<input id="loanAmount" type="number" placeholder="借りたい額">
<button onclick="requestLoan()">借りる</button>
<div id="repayArea"></div>
</div>

<div class="card">
<h3>参加プレイヤー</h3>
<div id="playerList"></div>
</div>

</div>
</div>

<script>

let currentName="";

// =================
// 参加
// =================
function joinGame(){

 const name=document.getElementById("playerName").value;

 fetch("/join",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })
 .then(()=>{
  currentName=name;
  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";
  loadState();
 });
}

// =================
// BET
// =================
function bet(){

 const amount=parseInt(
   document.getElementById("betAmount").value);

 fetch("/bet",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 })
 .then(r=>r.text())
 .then(msg=>{
   if(msg.includes("不足") || msg.includes("減らせ")){
     alert(msg);
     return;
   }
   loadState();
 });
}

// =================
// 借金申請
// =================
function requestLoan(){

 const amount=parseInt(
   document.getElementById("loanAmount").value);

 fetch("/loan/request",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 })
 .then(r=>r.json())
 .then(data=>{
   if(data.failed){
     alert("信用不足で通知が届かなかった");
   }else{
     alert("貸し手："+data.lender);
   }
 });
}

// =================
// 信用換金
// =================
function exchangeTrust(){

 fetch("/trust/exchange",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName})
 })
 .then(r=>r.text())
 .then(msg=>{
   if(msg.includes("不足") || msg.includes("できません")){
     alert(msg);
     return;
   }
   loadState();
 });
}

// =================
// 状態更新
// =================
function loadState(){

 fetch("/state")
 .then(r=>r.json())
 .then(data=>{

  document.getElementById("money")
    .textContent=Math.floor(data.players[currentName]);

  // 借金
  const loan=data.loans[currentName];
  document.getElementById("debt")
    .textContent=loan?loan.amount:"なし";

  // ===== 信用 =====
  const trust=data.trust[currentName]||0;
  const trustEl=document.getElementById("trustValue");
  const chanceEl=document.getElementById("trustChance");

  trustEl.textContent=trust;

  let chance=0;
  if(trust>=100) chance=100;
  else if(trust>=80) chance=80;
  else if(trust>=70) chance=70;
  else if(trust>=50) chance=50;
  else if(trust>=30) chance=30;
  else if(trust>=10) chance=10;
  else if(trust>=1) chance=5;

  chanceEl.textContent=chance+"%";

  if(chance>=80) trustEl.style.color="#2ecc71";
  else if(chance>=50) trustEl.style.color="#f39c12";
  else trustEl.style.color="#e74c3c";

  // プレイヤー一覧
  const list=document.getElementById("playerList");
  list.innerHTML="";

  for(let p in data.players){
    const div=document.createElement("div");
    div.textContent =
      p+" : "+Math.floor(data.players[p])+
      (data.bets[p] ? " (BET "+data.bets[p]+")":"");
    list.appendChild(div);
  }

 });
}

setInterval(loadState,2000);

</script>

</body>
</html>
