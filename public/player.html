<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
</head>

<body>

<h2>プレイヤー</h2>

<!-- ロビー -->
<div id="lobby">
  <input id="playerName" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<!-- ゲーム画面 -->
<div id="game" style="display:none;">

<p>名前: <span id="displayName"></span></p>
<p>💰 所持金: <span id="money">0</span></p>
<p>🎯 ラウンド: <span id="round">1</span></p>

<p>🔥 POT: <span id="pot">0</span></p>
<p>前回結果: <span id="lastResult">---</span></p>

<hr>

<input id="betAmount" type="number" placeholder="賭け金">
<button onclick="bet()">ベット</button>

<p>⭐ 現在倍率: <span id="previewMultiplier">1.2</span>x</p>

<hr>

<h3>借金</h3>
<input id="loanAmount" type="number" placeholder="借りたい額">
<button onclick="requestLoan()">借りる</button>

<div id="repayArea"></div>

<hr>

<h3>参加プレイヤー</h3>
<div id="playerList"></div>

</div>

<script>

let currentName="";
let lastRound=1;
let lastMoney=null;


// ===== 参加 =====
function joinGame(){

 const name=document.getElementById("playerName").value;

 fetch("/join",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })
 .then(()=>{
  currentName=name;

  document.getElementById("displayName").textContent=name;
  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";

  loadState();
 });
}


// ===== ベット =====
function bet(){

 const amount=parseInt(
   document.getElementById("betAmount").value);

 fetch("/bet",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 }).then(()=>loadState());
}


// ===== 倍率プレビュー =====
function calculateMultiplier(amount){

  if(amount>=500) return 5.0;
  if(amount>=200) return 3.0;
  if(amount>=150) return 2.0;
  if(amount>=100) return 1.9;
  if(amount>=75) return 1.8;
  if(amount>=50) return 1.5;
  if(amount>=20) return 1.4;

  return 1.2;
}

document.addEventListener("DOMContentLoaded",()=>{

  document.getElementById("betAmount")
  .addEventListener("input",()=>{

    const amount=parseInt(
      document.getElementById("betAmount").value)||0;

    document.getElementById("previewMultiplier")
      .textContent=calculateMultiplier(amount);
  });

});


// ===== 状態更新 =====
function loadState(){

 fetch("/state")
 .then(res=>res.json())
 .then(data=>{

  const money=data.players[currentName];

  document.getElementById("money").textContent=
    Math.floor(money);

  document.getElementById("round").textContent=
    data.round;

  // POT計算
  let pot=0;
  for(let p in data.bets){
    pot+=data.bets[p];
  }
  document.getElementById("pot").textContent=pot;

  // ===== 前回結果表示 =====
  if(lastMoney!==null && data.round!==lastRound){

    const diff=Math.floor(money-lastMoney);
    const result=document.getElementById("lastResult");

    if(diff>0){
      result.textContent="+"+diff;
      result.style.color="lime";
    }else if(diff<0){
      result.textContent=diff;
      result.style.color="red";
    }else{
      result.textContent="±0";
      result.style.color="white";
    }
  }

  lastMoney=money;
  lastRound=data.round;

  // ===== プレイヤー一覧 =====
  const list=document.getElementById("playerList");
  list.innerHTML="";

  for(let p in data.players){

    const div=document.createElement("div");

    let text=p;

    if(data.bets[p]){
      text+=" : BET "+data.bets[p];
    }else{
      text+=" : 待機中";
    }

    if(p===currentName){
      div.style.textDecoration="underline";
    }

    div.textContent=text;
    list.appendChild(div);
  }

 });
}

// 自動更新
setInterval(loadState,2000);

</script>

</body>
</html>
