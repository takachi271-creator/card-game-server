<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#111;
  color:white;
}

h2{
  text-align:center;
  margin:12px 0;
}

.container{
  padding:12px;
}

.card{
  background:#1c1c1c;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#2ecc71;
  color:white;
  margin-top:8px;
}

input{
  width:100%;
  padding:14px;
  font-size:18px;
  border-radius:10px;
  border:none;
  margin-top:6px;
}

#playerList div{
  background:#1a1a1a;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
}
</style>

</head>

<body>

<h2>プレイヤー</h2>

<!-- ロビー -->
<div id="lobby" class="container">
  <input id="playerName" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<!-- ゲーム -->
<div id="game" class="container" style="display:none;">

<div class="card">
<p>💰 所持金: <span id="money">0</span></p>
<p>🎯 ラウンド: <span id="round">1</span></p>
<p>🔥 POT: <span id="pot">0</span></p>
<p>前回結果: <span id="lastResult">---</span></p>
</div>

<div class="card">
<input id="betAmount" type="number" placeholder="賭け金">
<button onclick="bet()">ベット</button>
</div>

<div class="card">
<h3>借金</h3>
<input id="loanAmount" type="number" placeholder="借りたい額">
<button onclick="requestLoan()">借りる</button>
<div id="repayArea"></div>
</div>

<div class="card">
<h3>参加プレイヤー</h3>
<div id="playerList"></div>
</div>

</div>

<script>

let currentName="";
let lastRound=1;
let lastMoney=null;


// ===== 参加 =====
function joinGame(){

 const name=document.getElementById("playerName").value;

 fetch("/join",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })
 .then(()=>{

  currentName=name;

  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";

  loadState();
 });
}


// ===== BET（減額禁止対応）=====
function bet(){

 const amount=parseInt(
   document.getElementById("betAmount").value);

 fetch("/bet",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 })
 .then(res=>res.text())
 .then(data=>{

   if(data.includes("ベット")){
     alert(data);
     return;
   }

   loadState();
 });
}


// ===== 借金 =====
function requestLoan(){

 const input=document.getElementById("loanAmount");
 const amount=parseInt(input.value);

 if(!amount){
   alert("金額入力");
   return;
 }

 fetch("/loan/request",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    name:currentName,
    amount:amount
  })
 })
 .then(res=>res.json())
 .then(data=>{
   alert("貸し手候補: "+data.lender);
 });
}


// ===== 状態更新 =====
function loadState(){

 fetch("/state")
 .then(res=>res.json())
 .then(data=>{

  const money=data.players[currentName];

  document.getElementById("money").textContent=Math.floor(money);
  document.getElementById("round").textContent=data.round;

  // POT
  let pot=0;
  for(let p in data.bets){
    pot+=data.bets[p];
  }
  document.getElementById("pot").textContent=pot;

  // 前回結果
  if(lastMoney!==null && data.round!==lastRound){

    const diff=Math.floor(money-lastMoney);
    const result=document.getElementById("lastResult");

    if(diff>0){
      result.textContent="+"+diff;
      result.style.color="lime";
    }else if(diff<0){
      result.textContent=diff;
      result.style.color="red";
    }else{
      result.textContent="±0";
      result.style.color="white";
    }
  }

  lastMoney=money;
  lastRound=data.round;

  // プレイヤー一覧
  const list=document.getElementById("playerList");
  list.innerHTML="";

  for(let p in data.players){

    const div=document.createElement("div");

    let text=p;

    if(data.bets[p]){
      text+=" : BET "+data.bets[p];
    }else{
      text+=" : 待機中";
    }

    if(p===currentName){
      div.style.border="2px solid #2ecc71";
    }

    div.textContent=text;
    list.appendChild(div);
  }

 });
}

setInterval(loadState,2000);

</script>

</body>
</html>
