<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

.container{
max-width:420px;
margin:auto;
padding:12px;
}

.card{
background:#1c1c1c;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.betActive{
border:2px solid #2ecc71;
}

#playerNameTitle{
font-size:22px;
text-align:center;
margin-bottom:10px;
}

#winnerPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:16px;
text-align:center;
font-size:28px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div id="winnerPopup"></div>

<div class="container">

<!-- ロビー -->

<div id="lobby">

<h2>参加</h2>

<input id="playerName" placeholder="名前">

<button onclick="joinGame()">参加</button>

</div>


<!-- ゲーム画面 -->

<div id="game" style="display:none;">

<div id="playerNameTitle"></div>

<div class="card">

<p>💰 所持金 : <span id="money">0</span></p>

<p>💳 借金 : <span id="debt">なし</span></p>

<p id="interestText"></p>

<p>⭐ 信用 : <span id="trustValue">0</span></p>

<p id="gameOver" style="color:red;font-weight:bold;display:none;">
破産しました
</p>

</div>


<div class="card">

<h3>🎮 ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>POT : <span id="pot">0</span></p>

<p>最低BET : <span id="minBet">0</span></p>

<p>BET状態 : <span id="betState">可能</span></p>

</div>


<div class="card">

<h3>⭐ 信用ポイント</h3>

<p style="text-align:center;">現在</p>

<p style="font-size:30px;text-align:center;">
<span id="trust">0</span>
</p>

<p style="text-align:center;">
借金成功率 : <span id="trustChance">0%</span>
</p>

<p style="text-align:center;">
換金 : <span id="trustExchangeText"></span>
</p>

<button onclick="exchangeTrust()">
信用換金
</button>

</div>


<div class="card">

<h3>BET</h3>

<input id="betAmount" type="number" placeholder="BET金額">

<p>現在BET : <span id="myBet">0</span></p>

<p>現在倍率 : <span id="multiplier">1x</span></p>

<button onclick="bet()">ベット</button>

<button onclick="fold()">降りる</button>

</div>


<div class="card">

<h3>借金</h3>

<input id="loanAmount" type="number" placeholder="借りたい額">

<button onclick="requestLoan()">借りる</button>

<div id="repayArea"></div>

</div>


<div class="card">

<h3>BET履歴</h3>

<div id="betHistory"></div>

</div>


<div class="card">

<h3>参加プレイヤー</h3>

<div id="playerList"></div>

</div>

</div>
</div>


<script>

const socket = io()

let currentName=""

function calcMultiplier(bet,start){

const percent=(bet/start)*100

if(percent>=500) return 5
if(percent>=200) return 3
if(percent>=150) return 2
if(percent>=100) return 1.9
if(percent>=75) return 1.8
if(percent>=50) return 1.5
if(percent>=20) return 1.4

return 1.2

}

// 参加

function joinGame(){

const name=playerName.value

fetch("/join",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})

})
.then(r=>r.text())
.then(res=>{

if(res==="登録されていない名前"){

alert(res)
return

}

currentName=name

socket.emit("register",name)

lobby.style.display="none"
game.style.display="block"

playerNameTitle.textContent=name

loadState()

})

}


// BET

function bet(){

const amount=parseInt(betAmount.value)||0

fetch("/bet",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})

}).then(loadState)

}


// 降りる

function fold(){

fetch("/fold",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

}).then(loadState)

}


// 借金

function requestLoan(){

const amount=parseInt(loanAmount.value)

fetch("/loan/request",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})

}).then(r=>r.text()).then(alert)

}


// 信用換金

function exchangeTrust(){

fetch("/trust/exchange",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

}).then(loadState)

}


// 借金通知

socket.on("loanRequest",(data)=>{

if(confirm(`${data.borrower} が ${data.amount} 借りたい\n貸しますか？`)){

fetch("/loan/accept",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

})

}else{

fetch("/loan/reject",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

})

}

})


// ターン終了

socket.on("turnEnd",(data)=>{

winnerPopup.innerHTML=
"🏆 勝者<br><br>"+data.winner+
"<br><br>+"+data.amount

winnerPopup.style.display="block"

setTimeout(()=>{

winnerPopup.style.display="none"

},2000)

loadState()

})


// 状態更新

function loadState(){

fetch("/state")

.then(r=>r.json())

.then(data=>{

money.textContent=Math.floor(data.players[currentName]||0)

const loan=data.loans[currentName]

debt.textContent=loan?loan.amount:"なし"

interestText.textContent=
loan?("利息 : "+Math.ceil(loan.amount*0.1)):""

trust.textContent=data.trust[currentName]||0

trustValue.textContent=data.trust[currentName]||0

round.textContent=data.round

minBet.textContent=data.settings.minBet

betState.textContent=data.betEnabled?"可能":"不可能"

const myBet=data.bets[currentName]||0

myBetText=myBet

document.getElementById("myBet").textContent=myBet

const multiplierValue =
calcMultiplier(myBet,data.settings.startMoney)

multiplier.textContent=myBet?multiplierValue+"x":"1x"


// POT

let pot=0

for(let p in data.bets){

pot+=data.bets[p]

}

document.getElementById("pot").textContent=pot


// 信用成功率

const trustVal=data.trust[currentName]||0

let chance=0

if(trustVal>=100) chance=100
else if(trustVal>=80) chance=80
else if(trustVal>=70) chance=70
else if(trustVal>=50) chance=50
else if(trustVal>=30) chance=30
else if(trustVal>=10) chance=10
else if(trustVal>=1) chance=5

trustChance.textContent=chance+"%"


// 信用換金表示

trustExchangeText.textContent=
data.settings.trustExchange+
" → +"+
Math.floor(data.settings.startMoney*
data.settings.trustPercent)


// 破産

if(data.eliminated[currentName]){

gameOver.style.display="block"

}


// 返済

repayArea.innerHTML=""

if(loan){

const btn=document.createElement("button")

btn.textContent="全額返済"

btn.onclick=()=>{

fetch("/loan/repay",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

}).then(loadState)

}

repayArea.appendChild(btn)

}


// BET履歴

betHistory.innerHTML=""

data.betHistory.slice(-10).reverse().forEach(b=>{

const div=document.createElement("div")

div.textContent=
`R${b.round} ${b.player} BET ${b.bet}`

betHistory.appendChild(div)

})


// プレイヤー一覧

playerList.innerHTML=""

for(let p in data.players){

const div=document.createElement("div")

div.className=data.bets[p]?"betActive":""

div.textContent=
`${p} : ${Math.floor(data.players[p])}`
+(data.bets[p]?` (BET ${data.bets[p]})`:"")
+(data.folded[p]?" 降りた":"")
+(data.eliminated[p]?" ☠破産":"")

playerList.appendChild(div)

}

})

}

setInterval(loadState,1000)

</script>

</body>
</html>
