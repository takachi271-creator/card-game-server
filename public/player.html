<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

.container{
max-width:420px;
margin:auto;
padding:12px;
}

.card{
background:#1c1c1c;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.betActive{
border:2px solid #2ecc71;
}

#playerNameTitle{
font-size:22px;
text-align:center;
margin-bottom:10px;
}

#winnerPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:16px;
text-align:center;
font-size:28px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div id="winnerPopup"></div>

<div class="container">

<div id="lobby">

<h2>参加</h2>

<input id="playerName" placeholder="名前">

<button onclick="joinGame()">参加</button>

</div>


<div id="game" style="display:none;">

<div id="playerNameTitle"></div>


<div class="card">

<p>💰 所持金: <span id="money">0</span></p>

<p>💳 借金: <span id="debt">なし</span></p>

<p>⭐ 信用: <span id="trustValue">0</span></p>

</div>


<div class="card">

<h3>🎮 ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>POT : <span id="pot">0</span></p>

<p>現在倍率 : <span id="multiplier">1.2x</span></p>

<p>最低BET : <span id="minBet">0</span></p>

<p>借金成功率 : <span id="loanChance">0%</span></p>

<p>信用換金 : <span id="exchangeText">30 → +30</span></p>

</div>


<div class="card">

<button onclick="exchangeTrust()">信用換金</button>

</div>


<div class="card">

<h3>BET</h3>

<input id="betAmount" type="number" placeholder="賭け金">

<button onclick="bet()">ベット</button>

<button onclick="betZero()">ベットしない</button>

</div>


<div id="loanCard" class="card">

<h3>借金</h3>

<input id="loanAmount" type="number" placeholder="借りたい額">

<button id="loanButton" onclick="requestLoan()">借りる</button>

<div id="repayArea"></div>

</div>


<div class="card">

<h3>参加プレイヤー</h3>

<div id="playerList"></div>

</div>


</div>
</div>


<script>

const socket = io();

let currentName="";


function calcMultiplier(amount,startMoney){

const percent=(amount/startMoney)*100;

if(percent>=500) return 5;
if(percent>=200) return 3;
if(percent>=150) return 2;
if(percent>=100) return 1.9;
if(percent>=75) return 1.8;
if(percent>=50) return 1.5;
if(percent>=20) return 1.4;

return 1.2;

}


function calcLoanChance(trust){

if(trust>=100) return 100;
if(trust>=80) return 80;
if(trust>=70) return 70;
if(trust>=50) return 50;
if(trust>=30) return 30;
if(trust>=10) return 10;
if(trust>=1) return 5;

return 0;

}


// 参加
function joinGame(){

const name=playerName.value;

fetch("/join",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})
.then(()=>{

currentName=name;

socket.emit("register",currentName);

lobby.style.display="none";
game.style.display="block";

playerNameTitle.textContent=currentName;

loadState();

});

}


// BET
function bet(){

const amount=parseInt(betAmount.value)||0;

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
}).then(loadState);

}


function betZero(){

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount:0})
}).then(loadState);

}


// 借金
function requestLoan(){

const amount=parseInt(loanAmount.value);

fetch("/loan/request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
})
.then(r=>r.text())
.then(msg=>{

if(msg==="通知失敗")
alert("借金通知失敗");

if(msg==="借金失敗")
alert("貸せる人がいません");

});

}


// 信用換金
function exchangeTrust(){

fetch("/trust/exchange",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
}).then(loadState);

}


// 借金通知
socket.on("loanRequest",(data)=>{

if(confirm(`${data.borrower} が ${data.amount} 借りたい\n貸しますか？`)){

fetch("/loan/accept",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
});

}else{

fetch("/loan/reject",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
});

}

});


// 破産通知
socket.on("bankrupt",()=>{

alert("破産しました");

});


// 勝者通知
socket.on("turnEnd",(data)=>{

const popup=document.getElementById("winnerPopup");

popup.innerHTML=
"🏆 勝者<br><br>"+
data.winner+
"<br><br>+"+
data.amount;

popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},2000);

loadState();

});


// 状態更新
function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

money.textContent=Math.floor(data.players[currentName]||0);

const loan=data.loans[currentName];

debt.textContent=loan?loan.amount:"なし";

trustValue.textContent=data.trust[currentName]||0;

round.textContent=data.round;

minBet.textContent=data.settings.minBet;


// POT
let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

pot ? pot : 0;

document.getElementById("pot").textContent=pot;


// 倍率
const myBet=data.bets[currentName]||0;

multiplier.textContent=myBet>0
?calcMultiplier(myBet,data.settings.startMoney)+"x"
:"1.2x";


// 借金成功率
loanChance.textContent=
calcLoanChance(data.trust[currentName])+"%";


// 信用換金
const gain=
Math.floor(
data.settings.startMoney*0.3
);

exchangeText.textContent=
"30 → +" + gain;


// 借金UI
loanButton.disabled=loan?true:false;
loanAmount.disabled=loan?true:false;


// 返済
repayArea.innerHTML="";

if(loan){

const btn=document.createElement("button");

btn.textContent="全額返済";

btn.onclick=()=>{

fetch("/loan/repay",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
}).then(loadState);

};

repayArea.appendChild(btn);

}


// プレイヤー一覧
playerList.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");

div.className=data.bets[p]?"betActive":"";

div.textContent=
`${p} : ${Math.floor(data.players[p])}`
+(data.bets[p]?` (BET ${data.bets[p]})`:"");

playerList.appendChild(div);

}

});

}

setInterval(loadState,2000);

</script>

</body>
</html>
