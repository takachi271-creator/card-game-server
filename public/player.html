<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

.container{
max-width:420px;
margin:auto;
padding:12px;
}

.card{
background:#1c1c1c;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.betActive{
border:2px solid #2ecc71;
}

#winnerPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:16px;
text-align:center;
font-size:26px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div id="winnerPopup"></div>

<div class="container">

<!-- ロビー -->

<div id="lobby">

<h2>参加</h2>

<input id="playerName" placeholder="名前">

<button onclick="joinGame()">参加</button>

</div>


<!-- ゲーム -->

<div id="game" style="display:none">

<h2 id="playerTitle"></h2>


<!-- プレイヤー状態 -->

<div class="card">

<p>💰 所持金 : <span id="money">0</span></p>

<p>💳 借金 : <span id="debt">なし</span></p>

<p>⭐ 信用 : <span id="trust">0</span></p>

<p id="bankrupt" style="color:red;font-weight:bold;display:none">
☠ 破産しました
</p>

</div>


<!-- ゲーム状況 -->

<div class="card">

<h3>🎮 ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>POT : <span id="pot">0</span></p>

<p>最低BET : <span id="minBet">0</span></p>

<p>BET状態 : <span id="betState">可能</span></p>

<p>借金成功率 : <span id="loanChance">0%</span></p>

</div>


<!-- 信用 -->

<div class="card">

<h3>⭐ 信用ポイント</h3>

<p style="text-align:center">現在</p>

<p id="trustValue"
style="font-size:30px;font-weight:bold;text-align:center">
0
</p>

<p style="text-align:center">
換金レート :
<span id="trustRate"></span>
</p>

<button onclick="exchangeTrust()">
信用換金
</button>

</div>


<!-- BET -->

<div class="card">

<h3>BET</h3>

<input id="betAmount" type="number" placeholder="BET金額">

<p>現在BET : <span id="currentBet">0</span></p>

<p>現在倍率 : <span id="multiplier">1.0x</span></p>

<p>勝利時 : +<span id="winAmount">0</span></p>

<button onclick="bet()">ベット</button>

</div>


<!-- 借金 -->

<div class="card">

<h3>借金</h3>

<input id="loanAmount" type="number" placeholder="借りたい額">

<button onclick="requestLoan()">借りる</button>

<p>借金額 : <span id="loanValue">0</span></p>

<p>利息 : <span id="interest">0</span></p>

<div id="repayArea"></div>

</div>


<!-- プレイヤー -->

<div class="card">

<h3>参加プレイヤー</h3>

<div id="playerList"></div>

</div>


</div>
</div>


<script>

const socket = io();

let currentName="";


/* 借金成功率 */

function loanChance(trust){

if(trust>=100) return 100
if(trust>=80) return 80
if(trust>=70) return 70
if(trust>=50) return 50
if(trust>=30) return 30
if(trust>=10) return 10
if(trust>=1) return 5

return 0

}


/* 参加 */

function joinGame(){

const name=playerName.value

fetch("/join",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})
.then(res=>res.json())
.then(()=>{

currentName=name

socket.emit("register",name)

lobby.style.display="none"
game.style.display="block"

playerTitle.textContent=name

loadState()

})

}


/* BET */

function bet(){

const amount=parseInt(betAmount.value)||0

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
}).then(loadState)

}


/* 借金 */

function requestLoan(){

const amount=parseInt(loanAmount.value)||0

fetch("/loan/request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
})

}


/* 信用換金 */

function exchangeTrust(){

fetch("/trust/exchange",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
}).then(loadState)

}


/* 借金通知 */

socket.on("loanRequest",(data)=>{

if(confirm(data.borrower+" が "+data.amount+" 借りたい\n貸しますか？")){

fetch("/loan/accept",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
})

}else{

fetch("/loan/reject",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
})

}

})


/* 勝者通知 */

socket.on("turnEnd",(data)=>{

winnerPopup.innerHTML=
"🏆 勝者<br><br>"+
data.winner+
"<br><br>+"+
data.amount

winnerPopup.style.display="block"

setTimeout(()=>{
winnerPopup.style.display="none"
},2000)

loadState()

})


/* 状態更新 */

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

money.textContent=Math.floor(data.players[currentName]||0)

trust.textContent=data.trust[currentName]||0

trustValue.textContent=data.trust[currentName]||0

round.textContent=data.round

minBet.textContent=data.minBet

betState.textContent=data.betEnabled?"可能":"停止"


/* 借金成功率 */

const chance=loanChance(data.trust[currentName]||0)

loanChance.textContent=chance+"%"


/* POT */

let pot=0

for(let p in data.bets){
pot+=data.bets[p]
}

document.getElementById("pot").textContent=pot


/* BET */

const myBet=data.bets[currentName]||0

currentBet.textContent=myBet

multiplier.textContent="1x"

winAmount.textContent=pot


/* 借金 */

const loan=data.loans[currentName]

if(loan){

debt.textContent=loan.amount
loanValue.textContent=loan.amount
interest.textContent=Math.floor(loan.amount*0.1)

repayArea.innerHTML=""

const btn=document.createElement("button")

btn.textContent="全額返済"

btn.onclick=()=>{

fetch("/loan/repay",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
}).then(loadState)

}

repayArea.appendChild(btn)

}else{

debt.textContent="なし"
loanValue.textContent=0
interest.textContent=0
repayArea.innerHTML=""

}


/* 信用換金 */

trustRate.textContent=
data.trustCost+" → +"+
Math.floor(data.startMoney*data.trustPercent)


/* 破産 */

if(data.eliminated[currentName]){
bankrupt.style.display="block"
}


/* プレイヤー一覧 */

playerList.innerHTML=""

for(let p in data.players){

const div=document.createElement("div")

if(data.eliminated[p]){

div.textContent=p+" ☠ 破産しました"

}else{

div.className=data.bets[p]?"betActive":""

div.textContent=
p+" : "+Math.floor(data.players[p])+
(data.bets[p]?" (BET "+data.bets[p]+")":"")+
(data.loans[p]?" 💳"+data.loans[p].amount:"")

}

playerList.appendChild(div)

}

})

}


setInterval(loadState,1000)

</script>

</body>
</html>
