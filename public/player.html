<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

.container{
max-width:420px;
margin:auto;
padding:12px;
}

.card{
background:#1c1c1c;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.betActive{
border:2px solid #2ecc71;
}

#playerNameTitle{
font-size:22px;
text-align:center;
margin-bottom:10px;
}

#winnerPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:16px;
text-align:center;
font-size:28px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div id="winnerPopup"></div>

<div class="container">

<div id="lobby">

<h2>参加</h2>

<input id="playerName" placeholder="名前">

<button onclick="joinGame()">参加</button>

</div>


<div id="game" style="display:none;">

<div id="playerNameTitle"></div>

<div class="card">

<p>💰 所持金: <span id="money">0</span></p>

<p>💳 借金: <span id="debt">なし</span></p>

<p>⭐ 信用: <span id="trustValue">0</span></p>

</div>


<div class="card">

<h3>🎮 ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>POT : <span id="pot">0</span></p>

<p>最低BET : <span id="minBet">0</span></p>

<p>現在BET : <span id="betStatus"></span></p>

</div>


<div class="card">

<h3>⭐ 信用ポイント</h3>

<p>現在</p>

<p style="font-size:30px;text-align:center;">
<span id="trustNow">0</span>
</p>

<p>
通知成功率 : <span id="trustChance">0%</span>
</p>

<p>
換金 : 信用<span id="trustCost">30</span>
→ +<span id="trustGain">30</span>
</p>

<button onclick="exchangeTrust()">
信用換金
</button>

</div>


<div class="card">

<h3>BET</h3>

<input id="betAmount" type="number" placeholder="BET金額">

<button onclick="bet()">ベット</button>

</div>


<div class="card">

<h3>借金</h3>

<input id="loanAmount" type="number" placeholder="借りたい額">

<button onclick="requestLoan()">借りる</button>

<div id="repayArea"></div>

</div>


<div class="card">

<h3>BET履歴</h3>

<div id="betHistory"></div>

</div>


<div class="card">

<h3>参加プレイヤー</h3>

<div id="playerList"></div>

</div>

</div>
</div>


<script>

const socket = io();

let currentName="";


function joinGame(){

const name=playerName.value;

fetch("/join",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})
.then(()=>{

currentName=name;

socket.emit("register",currentName);

lobby.style.display="none";
game.style.display="block";

playerNameTitle.textContent=currentName;

loadState();

});

}


/* BET */

function bet(){

const amount=parseInt(betAmount.value)||0;

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
})
.then(loadState);

}


/* 借金 */

function requestLoan(){

const amount=parseInt(loanAmount.value)||0;

fetch("/loan/request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
});

}


/* 信用換金 */

function exchangeTrust(){

fetch("/trust/exchange",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
})
.then(loadState);

}


/* 状態更新 */

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

money.textContent=data.players[currentName]||0;

round.textContent=data.round;

minBet.textContent=data.minBet;

betStatus.textContent=data.betEnabled?"可能":"不可能";

let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

document.getElementById("pot").textContent=pot;


/* 信用 */

const trust=data.trust[currentName]||0;

trustValue.textContent=trust;

trustNow.textContent=trust;

trustCost.textContent=data.trustCost;

const gain=Math.floor(data.startMoney * data.trustPercent);

trustGain.textContent=gain;


/* 成功率 */

let chance=0;

if(trust>=100) chance=100;
else if(trust>=80) chance=80;
else if(trust>=70) chance=70;
else if(trust>=50) chance=50;
else if(trust>=30) chance=30;
else if(trust>=10) chance=10;
else if(trust>=1) chance=5;

trustChance.textContent=chance+"%";


/* BET履歴 */

betHistory.innerHTML="";

const history=data.betHistory[currentName]||[];

history.slice(-5).reverse().forEach(h=>{

const div=document.createElement("div");

div.textContent=
"Round "+h.round+" : "+h.amount;

betHistory.appendChild(div);

});


/* プレイヤー一覧 */

playerList.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");

div.textContent=
p+" 💰"+Math.floor(data.players[p]);

if(data.bets[p])
div.textContent+=" (BET "+data.bets[p]+")";

playerList.appendChild(div);

}

});

}


setInterval(loadState,1000);


/* 借金通知 */

socket.on("loanRequest",(data)=>{

if(confirm(data.borrower+" が "+data.amount+" 借りたい\n貸しますか？")){

fetch("/loan/accept",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
});

}else{

fetch("/loan/reject",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
});

}

});


/* 勝者通知 */

socket.on("turnEnd",(data)=>{

winnerPopup.innerHTML=
"🏆 "+data.winner+" 勝利<br>+"+data.amount;

winnerPopup.style.display="block";

setTimeout(()=>{
winnerPopup.style.display="none";
},2000);

loadState();

});

</script>

</body>
</html>
