<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

.container{
max-width:420px;
margin:auto;
padding:12px;
}

.card{
background:#1c1c1c;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.betActive{
border:2px solid #2ecc71;
}

#playerNameTitle{
font-size:22px;
text-align:center;
margin-bottom:10px;
}

#winnerPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:16px;
text-align:center;
font-size:28px;
display:none;
z-index:999;
}

</style>
</head>

<body>

<div id="winnerPopup"></div>

<div class="container">

<div id="lobby">

<h2>参加</h2>

<input id="playerName" placeholder="名前">

<button onclick="joinGame()">参加</button>

</div>


<div id="game" style="display:none;">

<div id="playerNameTitle"></div>


<div class="card">

<p>💰 所持金: <span id="money">0</span></p>

<p>💳 借金: <span id="debt">なし</span></p>

<p id="gameOver" style="color:red;font-weight:bold;display:none;">
破産しました
</p>

</div>


<div class="card">

<h3>🎮 ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>POT : <span id="pot">0</span></p>

<p>最低BET : <span id="minBet">0</span></p>

<p>
BET状態 :
<span id="betState">可能</span>
</p>

</div>


<div class="card">

<h3>⭐ 信用ポイント</h3>

<p style="text-align:center;">現在</p>

<p id="trustValue"
style="font-size:30px;font-weight:bold;text-align:center;">
0
</p>

<p style="text-align:center;">
通知成功率 :
<span id="trustChance">0%</span>
</p>

<button onclick="exchangeTrust()">
信用換金
</button>

</div>


<div class="card">

<h3>BET</h3>

<input id="betAmount" type="number" placeholder="BET">

<p>
現在倍率 :
<span id="multiplier">1.2x</span>
</p>

<button onclick="bet()">ベット</button>

</div>


<div class="card">

<h3>借金</h3>

<input id="loanAmount" type="number" placeholder="借りたい額">

<button onclick="requestLoan()">借りる</button>

<div id="repayArea"></div>

</div>


<div class="card">

<h3>参加プレイヤー</h3>

<div id="playerList"></div>

</div>

</div>
</div>


<script>

const socket = io();

let currentName="";


/* ⭐ QR自動参加 */

const params = new URLSearchParams(location.search);
const autoName = params.get("name");

if(autoName){

window.onload=()=>{

document.getElementById("playerName").value = autoName;

setTimeout(()=>{
joinGame();
},300);

};

}


/* 倍率計算 */

function calcMultiplier(amount,startMoney){

const percent=(amount/startMoney)*100;

if(percent>=500) return 5;
if(percent>=200) return 3;
if(percent>=150) return 2;
if(percent>=100) return 1.9;
if(percent>=75) return 1.8;
if(percent>=50) return 1.5;
if(percent>=20) return 1.4;

return 1.2;

}


/* 参加 */

function joinGame(){

const name=document.getElementById("playerName").value;

fetch("/join",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})

})

.then(res=>res.json())

.then(data=>{

if(data.error){

alert("この名前は登録されていません");
return;

}

currentName=name;

socket.emit("register",currentName);

document.getElementById("lobby").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("playerNameTitle").textContent=currentName;

loadState();

});

}


/* BET */

function bet(){

const amount=parseInt(document.getElementById("betAmount").value)||0;

fetch("/bet",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})

}).then(loadState);

}


/* 借金 */

function requestLoan(){

const amount=parseInt(document.getElementById("loanAmount").value);

fetch("/loan/request",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})

});

}


/* 信用換金 */

function exchangeTrust(){

fetch("/trust/exchange",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

}).then(loadState);

}


/* 借金通知 */

socket.on("loanRequest",(data)=>{

if(confirm(`${data.borrower} が ${data.amount} 借りたい\n貸しますか？`)){

fetch("/loan/accept",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

});

}else{

fetch("/loan/reject",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

});

}

});


/* 勝者表示 */

socket.on("turnEnd",(data)=>{

const popup=document.getElementById("winnerPopup");

popup.innerHTML=
"🏆 勝者<br><br>"+
data.winner+
"<br><br>+"+
data.amount;

popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},2000);

loadState();

});


/* 状態更新 */

function loadState(){

fetch("/state")

.then(r=>r.json())

.then(data=>{

document.getElementById("money").textContent=Math.floor(data.players[currentName]);

const loan=data.loans[currentName];

document.getElementById("debt").textContent=loan?loan.amount:"なし";

document.getElementById("round").textContent=data.round;

document.getElementById("minBet").textContent=data.minBet;


/* BET状態 */

document.getElementById("betState").textContent =
data.betEnabled ? "可能" : "不可能";


/* POT */

let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

document.getElementById("pot").textContent=pot;


/* 倍率 */

const myBet=data.bets[currentName]||0;

document.getElementById("multiplier").textContent =
myBet>0
?calcMultiplier(myBet,data.startMoney)+"x"
:"1.2x";


/* 信用 */

const trust=data.trust[currentName]||0;

document.getElementById("trustValue").textContent=trust;

let chance=0;

if(trust>=100) chance=100;
else if(trust>=80) chance=80;
else if(trust>=70) chance=70;
else if(trust>=50) chance=50;
else if(trust>=30) chance=30;
else if(trust>=10) chance=10;
else if(trust>=1) chance=5;

document.getElementById("trustChance").textContent=chance+"%";


/* 返済 */

const repayArea=document.getElementById("repayArea");

repayArea.innerHTML="";

if(loan){

const btn=document.createElement("button");

btn.textContent="全額返済";

btn.onclick=()=>{

fetch("/loan/repay",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})

}).then(loadState);

};

repayArea.appendChild(btn);

}


/* プレイヤー一覧 */

const playerList=document.getElementById("playerList");

playerList.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");

div.className=data.bets[p]?"betActive":"";

div.textContent =
p+" : "+Math.floor(data.players[p])+
(data.bets[p]?" (BET "+data.bets[p]+")":"");

playerList.appendChild(div);

}

});

}


setInterval(loadState,1000);

</script>

</body>
</html>
