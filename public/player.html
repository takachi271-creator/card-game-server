<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

button,input{
padding:12px;
font-size:18px;
margin:6px;
}

</style>

</head>

<body>

<div id="lobby">

<h2>参加</h2>

<input id="playerName">
<button onclick="joinGame()">参加</button>

</div>

<div id="game" style="display:none">

<h2 id="playerTitle"></h2>

<p>所持金 : <span id="money"></span></p>
<p>信用 : <span id="trust"></span></p>
<p>ラウンド : <span id="round"></span></p>
<p>POT : <span id="pot"></span></p>

<input id="betAmount" type="number">

<button onclick="bet()">BET</button>

<button onclick="fold()">降りる</button>

<div id="players"></div>

</div>

<script>

const socket=io()

let currentName=""

function joinGame(){

const name=document.getElementById("playerName").value

fetch("/join",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})
.then(r=>r.json())
.then(()=>{

currentName=name

socket.emit("register",name)

document.getElementById("lobby").style.display="none"
document.getElementById("game").style.display="block"

document.getElementById("playerTitle").textContent=name

loadState()

})

}

function bet(){

const amount=parseInt(
document.getElementById("betAmount").value)||0

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:currentName,
amount
})
})

}

function fold(){

fetch("/fold",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
})

}

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

money.textContent=data.players[currentName]

trust.textContent=data.trust[currentName]

round.textContent=data.round

let pot=0

for(let p in data.bets){
pot+=data.bets[p]
}

document.getElementById("pot").textContent=pot

const list=document.getElementById("players")

list.innerHTML=""

for(let p in data.players){

const div=document.createElement("div")

div.textContent=
p+" : "+data.players[p]+
(data.bets[p]?" (BET "+data.bets[p]+")":"")+
(data.folded[p]?" 降りた":"")

list.appendChild(div)

}

})

}

socket.on("turnEnd",(data)=>{

alert("勝者 "+data.winner+" +"+data.amount)

loadState()

})

setInterval(loadState,1000)

</script>

</body>
</html>
