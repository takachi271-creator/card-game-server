<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
</head>

<body>

<h2>プレイヤー</h2>

<!-- ===== ロビー ===== -->
<div id="lobby">
  <input id="playerName" placeholder="名前">
  <button onclick="joinGame()">参加</button>
</div>

<!-- ===== ゲーム ===== -->
<div id="game" style="display:none;">

<p>名前: <span id="displayName"></span></p>
<p>💰 所持金: <span id="money">0</span></p>
<p>🎯 ラウンド: <span id="round">1</span></p>
<p>🔥 POT: <span id="pot">0</span></p>
<p>💸 利息: <span id="interest">0</span>%</p>

<hr>

<input id="betAmount" type="number" placeholder="賭け金">
<button onclick="bet()">ベット</button>

<p>⭐ 現在倍率: <span id="previewMultiplier">1.2</span>x</p>

<hr>

<h3>借金</h3>
<input id="loanAmount" type="number" placeholder="借りたい額">
<button onclick="requestLoan()">借りる</button>

<div id="repayArea"></div>

<hr>

<h3>参加プレイヤー</h3>
<div id="playerList"></div>

<pre id="output"></pre>

</div>

<script>

let currentName="";

// ===== 参加 =====
function joinGame(){

 const name=document.getElementById("playerName").value;

 fetch("/join",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name})
 })
 .then(()=>{
  currentName=name;

  document.getElementById("displayName").textContent=name;
  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";

  loadState();
 });
}


// ===== ベット =====
function bet(){

 const amount=parseInt(
   document.getElementById("betAmount").value);

 fetch("/bet",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({name:currentName,amount})
 }).then(()=>loadState());
}


// ===== 借金申請 =====
function requestLoan(){

 const amount=parseInt(
   document.getElementById("loanAmount").value);

 fetch("/loan/request",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    name:currentName,
    amount:amount
  })
 })
 .then(res=>res.json())
 .then(data=>{
   alert("貸し手候補: "+data.lender);
 });
}


// ===== 倍率計算（プレビュー用）=====
function calculateMultiplier(amount){

  const percent = amount; // startMoney=100基準

  if(percent >= 500) return 5.0;
  if(percent >= 200) return 3.0;
  if(percent >= 150) return 2.0;
  if(percent >= 100) return 1.9;
  if(percent >= 75) return 1.8;
  if(percent >= 50) return 1.5;
  if(percent >= 20) return 1.4;

  return 1.2;
}


// ===== 入力時リアル更新 =====
document.addEventListener("DOMContentLoaded",()=>{

  document.getElementById("betAmount")
  .addEventListener("input",()=>{

    const amount =
      parseInt(document.getElementById("betAmount").value)||0;

    const multi = calculateMultiplier(amount);

    document.getElementById("previewMultiplier")
      .textContent = multi;
  });

});


// ===== 状態更新 =====
function loadState(){

 fetch("/state")
 .then(res=>res.json())
 .then(data=>{

  document.getElementById("money").textContent =
    Math.floor(data.players[currentName]);

  document.getElementById("round").textContent =
    data.round;

  document.getElementById("interest").textContent =
    Math.floor(data.interestRate*100);

  // POT計算
  let pot=0;
  for(let p in data.bets){
    pot+=data.bets[p];
  }
  document.getElementById("pot").textContent=pot;

  // ===== 返済UI =====
  const repayArea=document.getElementById("repayArea");
  repayArea.innerHTML="";

  if(data.loans[currentName]){

    const loan=data.loans[currentName];

    const info=document.createElement("p");
    info.textContent="借金："+loan.amount;

    const btn=document.createElement("button");
    btn.textContent="全額返済";

    btn.onclick=()=>{
      fetch("/loan/repay",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name:currentName})
      }).then(()=>loadState());
    };

    repayArea.appendChild(info);
    repayArea.appendChild(btn);
  }

  // ===== プレイヤー一覧 =====
  const list=document.getElementById("playerList");
  list.innerHTML="";

  for(let p in data.players){

    const div=document.createElement("div");

    let text=p;

    if(data.bets[p]){
      text+=" : BET "+data.bets[p];
    }else{
      text+=" : 待機中";
    }

    if(data.loans[p]){
      text+=" | 借金:"+data.loans[p].amount;
      div.style.color="red";
      div.style.fontWeight="bold";
    }

    if(p===currentName){
      div.style.textDecoration="underline";
    }

    div.textContent=text;
    list.appendChild(div);
  }

 });
}

// 自動更新
setInterval(loadState,2000);

</script>

</body>
</html>
