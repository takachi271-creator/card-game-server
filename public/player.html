<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

.container{
max-width:420px;
margin:auto;
padding:12px;
}

.card{
background:#1c1c1c;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,button{
width:100%;
padding:14px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.betActive{
border:2px solid #2ecc71;
}

#playerNameTitle{
font-size:22px;
text-align:center;
margin-bottom:10px;
}

#winnerPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:30px;
border-radius:16px;
text-align:center;
font-size:28px;
display:none;
z-index:999;
}

/* 破産画面 */

#bankruptPage{
display:none;
text-align:center;
padding-top:80px;
}

#bankruptName{
font-size:30px;
margin-bottom:20px;
}

#bankruptText{
font-size:26px;
color:red;
margin-bottom:40px;
}

</style>
</head>

<body>

<div id="winnerPopup"></div>

<div class="container">

<div id="lobby">

<h2>参加</h2>

<input id="playerName" placeholder="名前">

<button onclick="joinGame()">参加</button>

</div>


<div id="game" style="display:none;">

<div id="playerNameTitle"></div>


<div class="card">

<p>💰 所持金: <span id="money">0</span></p>

<p>💳 借金: <span id="debt">なし</span></p>

<p id="gameOver" style="color:red;font-weight:bold;display:none;">
GAME OVER
</p>

</div>


<div class="card">

<h3>🎮 ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>POT : <span id="pot">0</span></p>

<p>現在倍率 : <span id="multiplier">1.2x</span></p>

</div>


<div class="card">

<h3>⭐ 信用ポイント</h3>

<p style="text-align:center;">現在の額</p>

<p id="trustValue"
style="font-size:30px;font-weight:bold;text-align:center;">
0
</p>

<p style="text-align:center;">
通知成功率 :
<span id="trustChance">0%</span>
</p>

<button onclick="exchangeTrust()">
換金（信用30 → 資金回復）
</button>

</div>


<div class="card">

<h3>BET</h3>

<input id="betAmount" type="number" placeholder="賭け金">

<button onclick="bet()">ベット</button>

<button onclick="betZero()">ベットしない</button>

</div>


<div class="card">

<h3>借金</h3>

<input id="loanAmount" type="number" placeholder="借りたい額">

<button onclick="requestLoan()">借りる</button>

<div id="repayArea"></div>

</div>


<div class="card">

<h3>参加プレイヤー</h3>

<div id="playerList"></div>

</div>


</div>


<!-- ⭐破産ページ -->

<div id="bankruptPage">

<div id="bankruptName"></div>

<div id="bankruptText">
破産しました
</div>

<div class="card">

<p>参加中ゲーム</p>

<button onclick="location.reload()">
参加
</button>

<button onclick="watchGame()">
観戦
</button>

</div>

</div>

</div>


<script>

const socket = io();

let currentName="";


function calcMultiplier(amount,startMoney){

const percent=(amount/startMoney)*100;

if(percent>=500) return 5;
if(percent>=200) return 3;
if(percent>=150) return 2;
if(percent>=100) return 1.9;
if(percent>=75) return 1.8;
if(percent>=50) return 1.5;
if(percent>=20) return 1.4;

return 1.2;

}


// 参加

function joinGame(){

const name=playerName.value;

fetch("/join",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})
.then(()=>{

currentName=name;

socket.emit("register",currentName);

lobby.style.display="none";
game.style.display="block";

playerNameTitle.textContent=currentName;

loadState();

});

}


// BET

function bet(){

const amount=parseInt(betAmount.value)||0;

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
}).then(loadState);

}


// BETしない

function betZero(){

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount:0})
}).then(loadState);

}


// 借金

function requestLoan(){

const amount=parseInt(loanAmount.value);

fetch("/loan/request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
});

}


// 信用換金

function exchangeTrust(){

fetch("/trust/exchange",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
}).then(loadState);

}


// ⭐破産通知

socket.on("bankrupt",(data)=>{

if(data.name===currentName){

document.getElementById("game").style.display="none";

document.getElementById("bankruptPage").style.display="block";

document.getElementById("bankruptName").textContent=currentName;

}

});


// ⭐ターン終了

socket.on("turnEnd",(data)=>{

const popup=document.getElementById("winnerPopup");

popup.innerHTML=
"🏆 勝者<br><br>"+
data.winner+
"<br><br>+"+
data.amount;

popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},2000);

loadState();

});


// 観戦

function watchGame(){

document.getElementById("bankruptPage").style.display="none";

document.getElementById("game").style.display="block";

}


// 状態更新

function loadState(){

fetch("/state")

.then(r=>r.json())

.then(data=>{

money.textContent=Math.floor(data.players[currentName]);

const loan=data.loans[currentName];

debt.textContent=loan?loan.amount:"なし";

round.textContent=data.round;


let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

document.getElementById("pot").textContent=pot;


const myBet=data.bets[currentName]||0;

multiplier.textContent=myBet>0
?calcMultiplier(myBet,data.startMoney)+"x"
:"1.2x";


// プレイヤー一覧

playerList.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");

div.className=data.bets[p]?"betActive":"";

div.textContent=
`${p} : ${Math.floor(data.players[p])}`
+(data.bets[p]?` (BET ${data.bets[p]})`:"");

playerList.appendChild(div);

}

});

}


setInterval(loadState,1000);

</script>

</body>
</html>
