<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>
</head>

<body>

<h2>プレイヤー画面</h2>

<!-- ===== ロビー ===== -->
<div id="lobby">
  <h3>ロビー</h3>
  <input id="playerName" placeholder="名前を入力">
  <button onclick="joinGame()">参加する</button>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="game" style="display:none;">

  <p>プレイヤー: <span id="displayName"></span></p>
  <p>💰 所持金: <span id="money">0</span></p>
  <p>🎯 ラウンド: <span id="round">1</span></p>

  <hr>

  <input id="betAmount" type="number" placeholder="賭け金">
  <button onclick="bet()">ベット</button>

  <hr>

  <h3>参加中プレイヤー</h3>
  <div id="playerList"></div>

  <br>

  <button onclick="loadState()">状態更新</button>

  <pre id="output"></pre>

</div>

<script>

let currentName = "";

// =====================
// 参加
// =====================
function joinGame() {
  const name = document.getElementById("playerName").value;
  if (!name) return alert("名前を入力して");

  fetch("/join", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name })
  })
  .then(res => res.json())
  .then(() => {
    currentName = name;

    document.getElementById("displayName").textContent = name;
    document.getElementById("lobby").style.display = "none";
    document.getElementById("game").style.display = "block";

    loadState();
  });
}


// =====================
// ベット
// =====================
function bet() {

  const amount = parseInt(
    document.getElementById("betAmount").value
  );

  fetch("/bet", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: currentName,
      amount: amount
    })
  })
  .then(res => res.json())
  .then(() => loadState());
}


// =====================
// 状態取得
// =====================
function loadState() {
  fetch("/state")
    .then(res => res.json())
    .then(data => {

      // デバッグ表示
      document.getElementById("output").textContent =
        JSON.stringify(data, null, 2);

      // 所持金
      if (data.players[currentName] !== undefined) {
        document.getElementById("money").textContent =
          Math.floor(data.players[currentName]);
      }

      // ラウンド
      document.getElementById("round").textContent =
        data.round;

      // ⭐ プレイヤー一覧
      const list = document.getElementById("playerList");
      list.innerHTML = "";

      for (let name in data.players) {

        const div = document.createElement("div");

        if (data.bets[name]) {
          div.textContent = name + " : BET " + data.bets[name];
        } else {
          div.textContent = name + " : 待機中";
        }

        // 自分だけ少し強調
        if (name === currentName) {
          div.style.fontWeight = "bold";
        }

        list.appendChild(div);
      }
    });
}

// ⭐ 自動更新
setInterval(loadState, 2000);

</script>

</body>
</html>
