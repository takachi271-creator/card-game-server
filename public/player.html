<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player</title>

<script src="/socket.io/socket.io.js"></script>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

button,input{
padding:12px;
font-size:18px;
margin:6px;
}
</style>

</head>

<body>

<div id="lobby">

<h2>参加</h2>

<input id="playerName" placeholder="名前">

<button onclick="joinGame()">参加</button>

</div>


<div id="game" style="display:none">

<h2 id="playerTitle"></h2>

<p>所持金 : <span id="money">0</span></p>

<p>ラウンド : <span id="round">1</span></p>

<input id="betAmount" type="number" placeholder="BET">

<button onclick="bet()">BET</button>

<button onclick="betZero()">BETしない</button>

<h3>プレイヤー</h3>

<div id="playerList"></div>

</div>

<script>

const socket = io();

let currentName="";

function joinGame(){

const name=document.getElementById("playerName").value;

fetch("/join",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})
.then(()=>{

currentName=name;

socket.emit("register",name);

document.getElementById("lobby").style.display="none";
document.getElementById("game").style.display="block";

document.getElementById("playerTitle").textContent=name;

loadState();

});

}

function bet(){

const amount=parseInt(document.getElementById("betAmount").value)||0;

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount})
}).then(loadState);

}

function betZero(){

fetch("/bet",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName,amount:0})
}).then(loadState);

}

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

document.getElementById("money").textContent=data.players[currentName];
document.getElementById("round").textContent=data.round;

const list=document.getElementById("playerList");
list.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");

div.textContent=p+" : "+data.players[p];

if(data.bets[p]){
div.textContent+=" (BET "+data.bets[p]+")";
}

list.appendChild(div);

}

});

}

socket.on("loanRequest",(data)=>{

if(confirm(data.borrower+" が "+data.amount+" 借りたい\n貸しますか？")){

fetch("/loan/accept",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
});

}else{

fetch("/loan/reject",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:currentName})
});

}

});

socket.on("turnEnd",(data)=>{

alert(
"ラウンド終了\n\n"+
"勝者 : "+data.winner+
"\n獲得 : "+data.amount
);

loadState();

});

setInterval(loadState,2000);

</script>

</body>
</html>
