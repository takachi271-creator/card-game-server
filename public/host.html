<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}
.card{
background:#1c1c1c;
padding:14px;
margin:12px;
border-radius:12px;
}
button,input{
padding:10px;
margin:6px;
font-size:16px;
}
</style>

</head>

<body>

<h2>ホスト管理</h2>

<div class="card">

<h3>プレイヤー</h3>

<div id="players"></div>

<input id="newPlayerName" placeholder="名前">

<button onclick="addPlayer()">追加</button>

</div>

<div class="card">

<h3>QRコード</h3>

<div id="qr"></div>

</div>

<div class="card">

<p>ラウンド : <span id="round"></span></p>
<p>POT : <span id="pot"></span></p>
<p>BET状態 : <span id="betState"></span></p>

<button onclick="toggleBet()">BET受付切替</button>

</div>

<div class="card">

<h3>BETプレイヤー</h3>

<div id="bets"></div>

</div>

<div class="card">

<h3>ゲーム設定</h3>

<input id="startMoney"><br>
<input id="trustStart"><br>
<input id="trustCost"><br>
<input id="trustPercent"><br>
<input id="minBet"><br>

<button onclick="saveSettings()">保存</button>

</div>

<div class="card">

<button onclick="resetGame()">ゲームリセット</button>

</div>

<script>

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

round.textContent=data.round;

let pot=0;
for(let p in data.bets) pot+=data.bets[p];
document.getElementById("pot").textContent=pot;

betState.textContent=data.betEnabled?"可能":"不可能";

players.innerHTML="";

for(let p of data.allowedPlayers){

const div=document.createElement("div");

const online=data.online[p];

const btn=document.createElement("button");
btn.textContent="QR";

btn.onclick=()=>{

const url=location.origin+"/player.html?name="+p;

qr.innerHTML=
"<h3>"+p+"</h3>"+
"<img src='https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="+url+"'>";

};

div.textContent=p+" "+(online?"🟢":"🔴")+" ";
div.appendChild(btn);

players.appendChild(div);

}

bets.innerHTML="";

for(let p in data.bets){

const div=document.createElement("div");

div.textContent=p+" (BET "+data.bets[p]+") ";

const btn=document.createElement("button");

btn.textContent="勝者";

btn.onclick=()=>{

fetch("/winner",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:p})
});

};

div.appendChild(btn);
bets.appendChild(div);

}

});

}

function addPlayer(){

fetch("/player/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:newPlayerName.value})
});

}

function toggleBet(){
fetch("/bet/toggle",{method:"POST"});
}

function resetGame(){
fetch("/reset",{method:"POST"});
}

function saveSettings(){

fetch("/settings",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

startMoney:startMoney.value,
trustStart:trustStart.value,
trustCost:trustCost.value,
trustPercent:trustPercent.value,
minBet:minBet.value

})
});

}

setInterval(loadState,1000);

</script>

</body>
</html>
