<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<script src="/socket.io/socket.io.js"></script>

</head>

<body>

<h2>ホスト画面</h2>

<p>ラウンド : <span id="round">1</span></p>

<h3>プレイヤー</h3>

<div id="players"></div>

<h3>BETしているプレイヤー</h3>

<div id="winnerArea"></div>

<script>

const socket = io();

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

document.getElementById("round").textContent=data.round;

const playersDiv=document.getElementById("players");
playersDiv.innerHTML="";

for(let name in data.players){

const p=document.createElement("p");
p.textContent=name+" : "+data.players[name];

playersDiv.appendChild(p);

}

const winnerArea=document.getElementById("winnerArea");

winnerArea.innerHTML="";

for(let name in data.bets){

const row=document.createElement("div");

const label=document.createElement("span");
label.textContent=name+" (BET "+data.bets[name]+") ";

const btn=document.createElement("button");
btn.textContent="勝者";

btn.onclick=()=>{

const ok=confirm(name+" を勝者にしますか？");

if(!ok) return;

fetch("/winner",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name})
})
.then(res=>res.json())
.then(loadState);

};

row.appendChild(label);
row.appendChild(btn);

winnerArea.appendChild(row);

}

});

}

socket.on("turnEnd",(data)=>{

alert(
"ラウンド終了\n\n"+
"勝者 : "+data.winner+
"\n獲得 : "+data.amount
);

loadState();

});

setInterval(loadState,2000);

</script>

</body>
</html>
