<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

input,button{
padding:10px;
margin:6px;
font-size:18px;
}

</style>
</head>

<body>

<h2>ホスト管理</h2>

<h3>ゲーム設定</h3>

<p>初期資金</p>
<input id="setMoney" type="number" value="100">

<p>信用初期値</p>
<input id="setTrust" type="number" value="80">

<p>信用換金</p>
<input id="setTrustCost" type="number" value="30">
→
<input id="setTrustRate" type="number" value="0.3">

<p>最低BET</p>
<input id="setMinBet" type="number" value="5">

<br><br>

<button onclick="saveSettings()">
保存
</button>

<script>

function saveSettings(){

fetch("/settings/update",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

startMoney:parseInt(setMoney.value),
startTrust:parseInt(setTrust.value),
trustExchangeCost:parseInt(setTrustCost.value),
trustExchangeRate:parseFloat(setTrustRate.value),
minBet:parseInt(setMinBet.value)

})

})
.then(()=>alert("保存しました"))

}

</script>

</body>
</html>
