<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}
.card{
background:#1c1c1c;
padding:14px;
margin:12px;
border-radius:12px;
}
button,input{
padding:10px;
margin:6px;
font-size:16px;
}
</style>

</head>

<body>

<h2>ホスト管理</h2>

<div class="card">

<h3>プレイヤー</h3>

<div id="players"></div>

<input id="newPlayerName" placeholder="名前">

<button onclick="addPlayer()">プレイヤー追加</button>

</div>

<div class="card">

<h3>QRコード</h3>

<button onclick="showQR()">QR表示</button>

<div id="qr"></div>

</div>

<div class="card">

<p>ラウンド : <span id="round"></span></p>
<p>POT : <span id="pot"></span></p>
<p>BET状態 : <span id="betState"></span></p>

<button onclick="toggleBet()">BET受付切替</button>

</div>

<div class="card">

<h3>ゲーム設定</h3>

初期資金<br>
<input id="startMoney"><br>

信用初期値<br>
<input id="trustStart"><br>

信用換金コスト<br>
<input id="trustCost"><br>

信用換金％<br>
<input id="trustPercent"><br>

最低BET<br>
<input id="minBet"><br>

<button onclick="saveSettings()">保存</button>

</div>

<div class="card">

<button onclick="resetGame()">ゲームリセット</button>

</div>

<script>

function showQR(){

const url=location.origin+"/player.html";

qr.innerHTML=
"<img src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+url+"'>";

}

function resetGame(){
fetch("/reset",{method:"POST"});
}

function toggleBet(){
fetch("/bet/toggle",{method:"POST"});
}

function addPlayer(){

fetch("/player/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:newPlayerName.value})
});

}

function saveSettings(){

fetch("/settings",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

startMoney:startMoney.value,
trustStart:trustStart.value,
trustCost:trustCost.value,
trustPercent:trustPercent.value,
minBet:minBet.value

})
});

}

</script>

</body>
</html>
