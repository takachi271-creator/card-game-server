<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

input,button{
padding:10px;
margin:6px;
font-size:16px;
}

.card{
background:#222;
padding:10px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>ホスト管理</h2>

<div class="card">

<h3>ゲーム設定</h3>

初期資金  
<input id="startMoney" type="number">

<br>

信用初期値  
<input id="trustStart" type="number">

<br>

信用換金  
<input id="trustCost" type="number">

→ %

<input id="trustPercent" type="number" step="0.1">

<br>

最低BET  
<input id="minBet" type="number">

<br>

<button onclick="saveSettings()">設定保存</button>

</div>


<div class="card">

<h3>ゲーム状況</h3>

ラウンド : <span id="round"></span><br>
POT : <span id="pot"></span><br>
BET状態 : <span id="betState"></span>

<br><br>

<button onclick="toggleBet()">BET受付切替</button>

</div>


<div class="card">

<h3>プレイヤー</h3>

<div id="players"></div>

</div>


<div class="card">

<h3>BETプレイヤー</h3>

<div id="bets"></div>

</div>


<div class="card">

<button onclick="resetGame()">ゲームリセット</button>

</div>


<script>

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

round.textContent=data.round;

let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

document.getElementById("pot").textContent=pot;

betState.textContent=data.betEnabled?"可能":"不可能";


/* 設定表示 */

startMoney.value=data.startMoney;
trustStart.value=data.trustStart;
trustCost.value=data.trustCost;
trustPercent.value=data.trustPercent;
minBet.value=data.minBet;


/* プレイヤー */

players.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");

div.textContent=
p+" : "+data.players[p];

players.appendChild(div);

}


/* BET */

bets.innerHTML="";

for(let p in data.bets){

const div=document.createElement("div");

div.textContent=p+" (BET "+data.bets[p]+") ";

const btn=document.createElement("button");

btn.textContent="勝者";

btn.onclick=()=>{

fetch("/winner",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:p})
});

};

div.appendChild(btn);

bets.appendChild(div);

}

});

}


function toggleBet(){

fetch("/bet/toggle",{method:"POST"});

}


function saveSettings(){

fetch("/settings",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

startMoney:Number(startMoney.value),
trustStart:Number(trustStart.value),
trustCost:Number(trustCost.value),
trustPercent:Number(trustPercent.value),
minBet:Number(minBet.value)

})
});

}


function resetGame(){

fetch("/reset",{method:"POST"});

}


setInterval(loadState,1000);

</script>

</body>
</html>
