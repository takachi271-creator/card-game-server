<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HOST</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1c1c1c;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

button,input{
padding:10px;
margin-top:5px;
font-size:16px;
}

button{
background:#2ecc71;
color:white;
border:none;
border-radius:6px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin:5px 0;
}

.online{
color:#2ecc71;
}

.offline{
color:#777;
}

</style>

</head>

<body>

<div class="container">


<!-- ゲーム状況 -->

<div class="card">

<h3>ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>BET受付 : <span id="betStatus">ON</span></p>

<button onclick="toggleBet()">BET受付切替</button>

</div>



<!-- ゲーム設定 -->

<div class="card">

<h3>ゲーム設定</h3>

<p>初期資金</p>
<input id="startMoney" type="number">

<p>信用初期</p>
<input id="startTrust" type="number">

<p>信用換金</p>
<input id="trustCost" type="number">

<p>換金割合 (%)</p>
<input id="exchangeRate" type="number">

<p>最低BET</p>
<input id="minBet" type="number">

<button onclick="saveSettings()">設定保存</button>

<h4>現在設定</h4>

<div id="currentSettings"></div>

</div>



<!-- プレイヤー管理 -->

<div class="card">

<h3>プレイヤー管理</h3>

<input id="newPlayer" placeholder="名前">

<button onclick="addPlayer()">プレイヤー追加</button>

<div id="playerList"></div>

</div>



<!-- 勝者選択 -->

<div class="card">

<h3>勝者選択</h3>

<div id="winnerList"></div>

</div>



<!-- BET履歴 -->

<div class="card">

<h3>BET履歴</h3>

<div id="betHistory"></div>

</div>



<!-- ターン履歴 -->

<div class="card">

<h3>ターン履歴</h3>

<div id="turnHistory"></div>

</div>



<!-- 管理 -->

<div class="card">

<h3>管理</h3>

<button onclick="resetGame()">ゲームリセット</button>

</div>


</div>



<script>



function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{


round.textContent=data.round


betStatus.textContent=data.betEnabled ? "ON" : "OFF"



startMoney.value=data.settings.startMoney
startTrust.value=data.settings.startTrust
trustCost.value=data.settings.trustCost
exchangeRate.value=data.settings.exchangeRate
minBet.value=data.settings.minBet



currentSettings.innerHTML=
`
初期資金 ${data.settings.startMoney}<br>
信用初期 ${data.settings.startTrust}<br>
信用換金 ${data.settings.trustCost}<br>
換金割合 ${data.settings.exchangeRate}%<br>
最低BET ${data.settings.minBet}
`



playerList.innerHTML=""



for(let p in data.players){

const div=document.createElement("div")

const online=data.online[p]?"🟢":"⚫"

div.innerHTML=
`
<div class="row">
${p} ${online}
<button onclick="showQR('${p}')">QR</button>
<button onclick="removePlayer('${p}')">削除</button>
</div>
`

playerList.appendChild(div)

}



winnerList.innerHTML=""



for(let p in data.bets){

const div=document.createElement("div")

div.innerHTML=
`
${p} BET ${data.bets[p]}
<button onclick="setWinner('${p}')">勝者</button>
`

winnerList.appendChild(div)

}



betHistory.innerHTML=""


data.betHistory
.slice()
.reverse()
.forEach(h=>{

const div=document.createElement("div")

div.textContent=`R${h.round} ${h.name} BET ${h.amount}`

betHistory.appendChild(div)

})



turnHistory.innerHTML=""


data.turnHistory
.slice()
.reverse()
.forEach(h=>{

const div=document.createElement("div")

div.textContent=`R${h.round} ${h.winner} +${h.amount}`

turnHistory.appendChild(div)

})


})

}



function toggleBet(){

fetch("/bet/toggle",{method:"POST"})
.then(loadState)

}



function saveSettings(){

fetch("/settings",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

startMoney:parseInt(startMoney.value),

startTrust:parseInt(startTrust.value),

trustCost:parseInt(trustCost.value),

exchangeRate:parseInt(exchangeRate.value),

minBet:parseInt(minBet.value)

})

}).then(loadState)

}



function addPlayer(){

fetch("/player/add",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:newPlayer.value

})

}).then(loadState)

}



function removePlayer(name){

fetch("/player/remove",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name

})

}).then(loadState)

}



function setWinner(name){

fetch("/winner",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name

})

}).then(loadState)

}



function resetGame(){

fetch("/reset",{method:"POST"})
.then(loadState)

}



function showQR(name){

const url=location.origin+"/player.html?name="+name

prompt("QR用URL",url)

}



setInterval(loadState,2000)

loadState()


</script>


</body>
</html>
