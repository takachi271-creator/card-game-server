<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

.card{
background:#1c1c1c;
padding:12px;
margin:10px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

</style>

</head>

<body>

<h1>HOST</h1>

<div class="card">

<h3>プレイヤー登録</h3>

<input id="newPlayer">
<button onclick="addPlayer()">追加</button>

<div id="players"></div>

</div>

<div class="card">

<h3>ゲーム管理</h3>

<button onclick="toggleBet()">BET受付切替</button>

<button onclick="resetGame()">ゲームリセット</button>

</div>

<div class="card">

<h3>勝者選択</h3>

<div id="winnerList"></div>

</div>

<div class="card">

<h3>ターン履歴</h3>

<div id="history"></div>

</div>

<script>

function addPlayer(){

fetch("/host/addPlayer",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:document.getElementById("newPlayer").value
})
})

}

function resetGame(){

fetch("/host/reset",{method:"POST"})

}

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

const p=document.getElementById("players")

p.innerHTML=""

for(let name of data.allowedPlayers){

const div=document.createElement("div")

div.innerHTML=name+
(data.online[name]?" 🟢":" ⚫")

p.appendChild(div)

}

const w=document.getElementById("winnerList")

w.innerHTML=""

for(let p in data.bets){

const btn=document.createElement("button")

btn.textContent=p+" 勝者"

btn.onclick=()=>{

fetch("/winner",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:p})
})

}

w.appendChild(btn)

}

const h=document.getElementById("history")

h.innerHTML=""

data.turnHistory.slice().reverse().forEach(t=>{

const div=document.createElement("div")

div.textContent=
"R"+t.round+" "+t.winner+" +"+t.pot

h.appendChild(div)

})

})

}

setInterval(loadState,1000)

</script>

</body>
</html>
