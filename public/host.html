<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HOST</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

.container{
max-width:480px;
margin:auto;
padding:12px;
}

.card{
background:#1c1c1c;
padding:16px;
border-radius:14px;
margin-bottom:14px;
}

h3{
margin-top:0;
border-bottom:1px solid #333;
padding-bottom:6px;
}

button,input{
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
margin-top:6px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.smallBtn{
width:auto;
padding:6px 10px;
font-size:14px;
margin-left:4px;
}

.playerRow{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid #333;
}

.online{
color:#2ecc71;
}

.offline{
color:#777;
}

.log{
font-size:14px;
border-bottom:1px solid #333;
padding:4px 0;
}

.qrPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:20px;
border-radius:12px;
display:none;
z-index:1000;
}

</style>

</head>

<body>

<div class="container">

<h2>HOST</h2>

<!-- ゲーム状況 -->

<div class="card">

<h3>ゲーム状況</h3>

<p>ラウンド : <span id="round">1</span></p>

<p>BET受付 :
<span id="betStatus">可能</span>
</p>

<button onclick="toggleBet()">BET受付切替</button>

</div>


<!-- ゲーム設定 -->

<div class="card">

<h3>ゲーム設定</h3>

初期資金
<input id="startMoney" type="number">

信用初期
<input id="startTrust" type="number">

信用換金
<input id="trustCost" type="number">

換金割合 %
<input id="exchangeRate" type="number">

最低BET
<input id="minBet" type="number">

<button onclick="saveSettings()">設定保存</button>

<p style="margin-top:10px">

現在設定<br>

資金 : <span id="cfgMoney"></span><br>
信用 : <span id="cfgTrust"></span><br>
最低BET : <span id="cfgBet"></span>

</p>

</div>


<!-- プレイヤー管理 -->

<div class="card">

<h3>プレイヤー管理</h3>

<input id="newPlayer" placeholder="名前">

<button onclick="addPlayer()">プレイヤー追加</button>

<div id="playerList"></div>

</div>


<!-- 勝者選択 -->

<div class="card">

<h3>勝者選択</h3>

<div id="winnerList"></div>

</div>


<!-- 他ゲー用 -->

<div class="card">

<h3>他ゲー用操作</h3>

<div id="otherGameTools"></div>

</div>


<!-- BET履歴 -->

<div class="card">

<h3>BET履歴</h3>

<div id="betHistory"></div>

</div>


<!-- ターン履歴 -->

<div class="card">

<h3>ターン履歴</h3>

<div id="turnHistory"></div>

</div>


<!-- 管理 -->

<div class="card">

<h3>管理</h3>

<button onclick="resetGame()">ゲームリセット</button>

</div>


</div>


<!-- QRポップアップ -->

<div id="qrPopup" class="qrPopup">

<h3 id="qrName"></h3>

<img id="qrImg" width="220">

<br><br>

<button onclick="closeQR()">閉じる</button>

</div>
