<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

input,button{
padding:10px;
margin:6px;
font-size:16px;
}

.card{
background:#222;
padding:10px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>ホスト管理</h2>

<div class="card">

<h3>プレイヤー</h3>

<div id="players"></div>

<input id="newPlayerName" placeholder="名前を入力">

<button onclick="addPlayer()">プレイヤーを追加</button>

</div>

<div class="card">

ラウンド : <span id="round"></span><br>
POT : <span id="pot"></span><br>
BET状態 : <span id="betState"></span>

<br>

<button onclick="toggleBet()">BET受付切替</button>

</div>

<div class="card">

<h3>BETプレイヤー</h3>

<div id="bets"></div>

</div>

<div class="card">

<button onclick="resetGame()">ゲームリセット</button>

</div>

<script>

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

round.textContent=data.round;

let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

document.getElementById("pot").textContent=pot;

betState.textContent=data.betEnabled?"可能":"不可能";

players.innerHTML="";

for(let p of data.allowedPlayers){

const div=document.createElement("div");

const online=data.online[p];

div.textContent=
p + (online ? " 🟢" : " 🔴");

players.appendChild(div);

}

bets.innerHTML="";

for(let p in data.bets){

const div=document.createElement("div");

div.textContent=p+" (BET "+data.bets[p]+") ";

const btn=document.createElement("button");

btn.textContent="勝者";

btn.onclick=()=>{

fetch("/winner",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:p})
});

};

div.appendChild(btn);

bets.appendChild(div);

}

});

}


function addPlayer(){

const name=newPlayerName.value;

fetch("/player/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
}).then(loadState);

}


function toggleBet(){

fetch("/bet/toggle",{method:"POST"});

}


function resetGame(){

fetch("/reset",{method:"POST"});

}


setInterval(loadState,1000);

</script>

</body>
</html>
