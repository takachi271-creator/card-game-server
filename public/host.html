<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

.card{
background:#1c1c1c;
margin:12px;
padding:14px;
border-radius:12px;
}

button,input{
padding:10px;
font-size:16px;
margin:6px;
border:none;
border-radius:8px;
}

button{
background:#2ecc71;
color:white;
}

#qrPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:25px;
border-radius:14px;
display:none;
z-index:999;
}

#qrcode{
margin:10px;
}

</style>

</head>

<body>

<h2>ホスト管理</h2>


<div class="card">

<h3>プレイヤー</h3>

<div id="players"></div>

<input id="newPlayerName" placeholder="名前">

<button onclick="addPlayer()">プレイヤーを追加</button>

</div>


<div class="card">

<h3>ゲーム状況</h3>

<p>ラウンド : <span id="round"></span></p>

<p>POT : <span id="pot"></span></p>

<p>BET状態 :
<span id="betState"></span>
</p>

<button onclick="toggleBet()">BET受付切替</button>

</div>


<div class="card">

<h3>BETプレイヤー</h3>

<div id="bets"></div>

</div>


<div class="card">

<button onclick="resetGame()">ゲームリセット</button>

</div>


<div id="qrPopup">

<h3 id="qrTitle"></h3>

<div id="qrcode"></div>

<p id="qrUrl"></p>

<button onclick="copyURL()">URLコピー</button>

<br>

<button onclick="closeQR()">閉じる</button>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>


function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{


round.textContent=data.round;


/* POT */

let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

pot ? pot : 0;

document.getElementById("pot").textContent=pot;


/* BET状態 */

betState.textContent=data.betEnabled?"可能":"不可能";


/* プレイヤー一覧 */

players.innerHTML="";

for(let p of data.allowedPlayers){

const div=document.createElement("div");

const online=data.online[p];

const qrBtn=document.createElement("button");

qrBtn.textContent="QRを表示";

qrBtn.onclick=()=>showQR(p);


div.textContent=p+" "+(online?"🟢":"🔴")+" ";

div.appendChild(qrBtn);

players.appendChild(div);

}


/* BET一覧 */

bets.innerHTML="";

for(let p in data.bets){

const div=document.createElement("div");

div.textContent=p+" (BET "+data.bets[p]+") ";

const btn=document.createElement("button");

btn.textContent="勝者";

btn.onclick=()=>{

fetch("/winner",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:p})
});

};

div.appendChild(btn);

bets.appendChild(div);

}

});

}


/* QR表示 */

function showQR(name){

const url =
window.location.origin +
"/player.html?name=" +
encodeURIComponent(name);

document.getElementById("qrTitle").textContent =
name+" の参加QR";

document.getElementById("qrUrl").textContent=url;

const qr=document.getElementById("qrcode");

qr.innerHTML="";

new QRCode(qr,{
text:url,
width:200,
height:200
});

document.getElementById("qrPopup").style.display="block";

}


/* QR閉じる */

function closeQR(){

document.getElementById("qrPopup").style.display="none";

}


/* URLコピー */

function copyURL(){

const text=document.getElementById("qrUrl").textContent;

navigator.clipboard.writeText(text);

alert("URLコピーしました");

}


/* プレイヤー追加 */

function addPlayer(){

const name=newPlayerName.value;

fetch("/player/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name})
})
.then(loadState);

}


/* BET切替 */

function toggleBet(){

fetch("/bet/toggle",{method:"POST"});

}


/* リセット */

function resetGame(){

fetch("/reset",{method:"POST"});

}


setInterval(loadState,1000);

</script>

</body>
</html>
