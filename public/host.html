<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

button,input{
width:100%;
padding:12px;
font-size:16px;
margin-top:8px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#2ecc71;
color:white;
}

.player{
padding:6px;
border-bottom:1px solid #333;
}

.betPlayer{
color:#2ecc71;
font-weight:bold;
}

.winnerBtn{
background:#3498db;
margin-top:5px;
}

.danger{
background:#e74c3c;
}

</style>
</head>

<body>

<div class="container">

<h2>ホスト管理</h2>

<div class="card">

<h3>ゲーム設定</h3>

初期資金
<input id="startMoney" type="number" value="100">

信用初期値
<input id="trustStart" type="number" value="80">

信用換金
<input id="trustCost" type="number" value="30">

換金率 %
<input id="trustPercent" type="number" step="0.1" value="0.3">

最低BET
<input id="minBet" type="number" value="5">

<button onclick="saveSettings()">保存</button>

</div>


<div class="card">

<h3>ゲーム状況</h3>

ラウンド : <span id="round">1</span>

<br><br>

POT : <span id="pot">0</span>

</div>


<div class="card">

<h3>プレイヤー</h3>

<div id="playerList"></div>

</div>


<div class="card">

<h3>BETしているプレイヤー</h3>

<div id="betPlayers"></div>

</div>


<div class="card">

<button class="danger" onclick="resetGame()">
ゲームリセット
</button>

</div>


</div>


<script>

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

document.getElementById("round").textContent=data.round;

let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

document.getElementById("pot").textContent=pot;


/* プレイヤー一覧 */

const list=document.getElementById("playerList");
list.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");
div.className="player";

let text=p+" 💰"+Math.floor(data.players[p]);

if(data.loans[p]){
text+=" 💳"+data.loans[p].amount;
}

if(data.eliminated[p]){
text+=" ☠破産";
}

div.textContent=text;

list.appendChild(div);

}


/* BETプレイヤー */

const betDiv=document.getElementById("betPlayers");
betDiv.innerHTML="";

for(let p in data.bets){

const div=document.createElement("div");
div.className="player betPlayer";

div.textContent=p+" (BET "+data.bets[p]+")";

const btn=document.createElement("button");
btn.className="winnerBtn";
btn.textContent="勝者";

btn.onclick=()=>{

if(confirm(p+" を勝者にしますか？")){

fetch("/winner",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name:p})
}).then(loadState);

}

};

div.appendChild(btn);

betDiv.appendChild(div);

}

});

}


/* 設定保存 */

function saveSettings(){

fetch("/settings",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

startMoney:parseFloat(startMoney.value),
trustStart:parseFloat(trustStart.value),
trustCost:parseFloat(trustCost.value),
trustPercent:parseFloat(trustPercent.value),
minBet:parseFloat(minBet.value)

})
});

alert("設定保存");

}


/* リセット */

function resetGame(){

if(!confirm("ゲームリセットしますか？")) return;

fetch("/reset",{
method:"POST"
}).then(()=>{

alert("ゲームリセットしました");

location.reload();

});

}


setInterval(loadState,1000);

</script>

</body>
</html>
