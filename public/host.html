<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HOST</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
margin:0;
padding:20px;
}

.card{
background:#1c1c1c;
padding:16px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:10px;
margin:4px;
font-size:14px;
}

input{
padding:8px;
margin:4px;
}

.row{
margin-bottom:6px;
}

.online{
color:#2ecc71;
}

.offline{
color:#888;
}

</style>
</head>

<body>

<h1>HOST</h1>

<div class="card">

<h3>ゲーム状況</h3>

ラウンド :
<span id="round">1</span>

<br><br>

BET受付 :
<span id="betStatus">ON</span>

<br>

<button onclick="toggleBet()">BET受付切替</button>

</div>

<div class="card">

<h3>ゲーム設定</h3>

初期資金
<input id="startMoney" type="number">

<br>

信用初期
<input id="startTrust" type="number">

<br>

信用換金
<input id="trustCost" type="number">
→
<input id="exchangeRate" type="number">%

<br>

最低BET
<input id="minBet" type="number">

<br>

<button onclick="saveSettings()">設定保存</button>

<br><br>

現在設定

<div id="settingsView"></div>

</div>

<div class="card">

<h3>プレイヤー管理</h3>

<input id="newPlayerName" placeholder="名前">

<button onclick="addPlayer()">プレイヤー追加</button>

<div id="playerList"></div>

</div>

<div class="card">

<h3>勝者選択</h3>

<div id="winnerList"></div>

</div>

<div class="card">

<h3>他ゲーム用</h3>

<div id="adminPlayers"></div>

</div>

<div class="card">

<h3>BET履歴</h3>

<div id="betHistory"></div>

</div>

<div class="card">

<h3>ターン履歴</h3>

<div id="turnHistory"></div>

</div>

<div class="card">

<h3>管理</h3>

<button onclick="resetGame()">ゲームリセット</button>

</div>


<script>

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

document.getElementById("round").textContent=data.round

document.getElementById("betStatus").textContent=
data.betEnabled ? "ON" : "OFF"


document.getElementById("settingsView").textContent=
"初期資金:"+data.settings.startMoney+
" 信用:"+data.settings.startTrust+
" 換金:"+data.settings.trustCost+
"→"+data.settings.exchangeRate+"%"+
" 最低BET:"+data.settings.minBet


const list=document.getElementById("playerList")

list.innerHTML=""

for(let p in data.players){

const online=data.online[p] ? "🟢" : "⚫"

const row=document.createElement("div")

row.className="row"

row.innerHTML=
p+" "+online+
" 💰"+Math.floor(data.players[p])+
" ⭐"+(data.trust[p]||0)+
" <button onclick=\"removePlayer('"+p+"')\">削除</button>"

list.appendChild(row)

}



const winnerDiv=document.getElementById("winnerList")

winnerDiv.innerHTML=""

for(let p in data.bets){

const bet=data.bets[p]

const row=document.createElement("div")

row.className="row"

row.innerHTML=
p+" BET "+bet+
" <button onclick=\"selectWinner('"+p+"')\">勝者</button>"

winnerDiv.appendChild(row)

}



const admin=document.getElementById("adminPlayers")

admin.innerHTML=""

for(let p in data.players){

const bet=data.bets[p]||0

const row=document.createElement("div")

row.className="row"

row.innerHTML=
p+" BET "+bet+

" <button onclick=\"confiscate('"+p+"')\">没収</button>"+
" <button onclick=\"refund('"+p+"')\">返却</button>"+
" <button onclick=\"doubleMoney('"+p+"')\">2倍</button>"+
" <button onclick=\"tripleMoney('"+p+"')\">3倍</button>"

admin.appendChild(row)

}



const betHistory=document.getElementById("betHistory")

betHistory.innerHTML=""

data.betHistory.slice().reverse().forEach(h=>{

const row=document.createElement("div")

row.textContent=
"R"+h.round+" "+h.name+" BET "+h.amount

betHistory.appendChild(row)

})



const turnHistory=document.getElementById("turnHistory")

turnHistory.innerHTML=""

data.turnHistory.slice().reverse().forEach(h=>{

const row=document.createElement("div")

row.textContent=
"R"+h.round+" "+h.winner+" +"+h.reward

turnHistory.appendChild(row)

})

})

}



function toggleBet(){

fetch("/bet/toggle",{method:"POST"})
.then(loadState)

}

function saveSettings(){

fetch("/settings",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({

startMoney:parseInt(startMoney.value),
startTrust:parseInt(startTrust.value),
trustCost:parseInt(trustCost.value),
exchangeRate:parseInt(exchangeRate.value),
minBet:parseInt(minBet.value)

})

}).then(loadState)

}



function addPlayer(){

fetch("/player/add",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
name:newPlayerName.value
})

}).then(loadState)

}



function removePlayer(name){

fetch("/player/remove",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({name})

}).then(loadState)

}



function selectWinner(name){

fetch("/winner",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({name})

}).then(loadState)

}



function confiscate(name){

fetch("/admin/confiscate",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({name})

}).then(loadState)

}



function refund(name){

fetch("/admin/refund",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({name})

}).then(loadState)

}



function doubleMoney(name){

fetch("/admin/double",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({name})

}).then(loadState)

}



function tripleMoney(name){

fetch("/admin/triple",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({name})

}).then(loadState)

}



function resetGame(){

fetch("/reset",{method:"POST"})
.then(loadState)

}



setInterval(loadState,2000)

loadState()

</script>

</body>
</html>
