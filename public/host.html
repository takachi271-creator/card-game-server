<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

.card{
background:#1c1c1c;
padding:14px;
margin:12px;
border-radius:12px;
}

button,input{
padding:10px;
margin:6px;
font-size:16px;
}

</style>

</head>

<body>

<h2>ホスト管理</h2>

<div class="card">

<h3>プレイヤー</h3>

<div id="players"></div>

<input id="newPlayerName" placeholder="名前">

<button onclick="addPlayer()">追加</button>

</div>


<div class="card">

<p>ラウンド : <span id="round"></span></p>

<p>POT : <span id="pot"></span></p>

<p>BET状態 :
<span id="betState"></span>
</p>

<button onclick="toggleBet()">BET受付切替</button>

</div>


<div class="card">

<h3>ゲーム設定</h3>

初期資金<br>
<input id="startMoney"><br>

信用初期値<br>
<input id="trustStart"><br>

信用換金コスト<br>
<input id="trustCost"><br>

信用換金％<br>
<input id="trustPercent"><br>

最低BET<br>
<input id="minBet"><br>

<button onclick="saveSettings()">保存</button>

</div>


<div class="card">

<h3>BETプレイヤー</h3>

<div id="bets"></div>

</div>


<script>

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

round.textContent=data.round;

let pot=0;

for(let p in data.bets)
pot+=data.bets[p];

pot?pot:0;

document.getElementById("pot").textContent=pot;

betState.textContent=data.betEnabled?"可能":"不可能";


players.innerHTML="";

for(let p of data.allowedPlayers){

const div=document.createElement("div");

const online=data.online[p];

div.textContent=p+" "+(online?"🟢":"🔴");

players.appendChild(div);

}


bets.innerHTML="";

for(let p in data.bets){

const div=document.createElement("div");

div.textContent=p+" (BET "+data.bets[p]+") ";

const btn=document.createElement("button");

btn.textContent="勝者";

btn.onclick=()=>{

fetch("/winner",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:p})
});

};

div.appendChild(btn);

bets.appendChild(div);

}


startMoney.value=data.startMoney;
trustStart.value=data.trustStart;
trustCost.value=data.trustCost;
trustPercent.value=data.trustPercent;
minBet.value=data.minBet;

});

}


function addPlayer(){

fetch("/player/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name:newPlayerName.value})
}).then(loadState);

}


function toggleBet(){

fetch("/bet/toggle",{method:"POST"});

}


function saveSettings(){

fetch("/settings",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

startMoney:startMoney.value,
trustStart:trustStart.value,
trustCost:trustCost.value,
trustPercent:trustPercent.value,
minBet:minBet.value

})
});

}


setInterval(loadState,1000);

</script>

</body>
</html>
