<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Host</title>

<style>
body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
padding:12px;
font-size:18px;
margin:8px;
}
</style>

</head>

<body>

<h1>ホスト管理</h1>

<p>ラウンド : <span id="round"></span></p>

<p>POT : <span id="pot"></span></p>

<p>BET状態 : <span id="betStatus"></span></p>

<button onclick="toggleBet()">BET受付切替</button>

<hr>

<h2>プレイヤー</h2>

<div id="players"></div>

<hr>

<h2>BETプレイヤー</h2>

<div id="bets"></div>

<hr>

<button onclick="resetGame()">ゲームリセット</button>

<script>

function loadState(){

fetch("/state")
.then(r=>r.json())
.then(data=>{

round.textContent=data.round;

let pot=0;

for(let p in data.bets){
pot+=data.bets[p];
}

pot.textContent=pot;

betStatus.textContent=data.betEnabled?"可能":"不可能";

players.innerHTML="";

for(let p in data.players){

const div=document.createElement("div");

div.textContent=
p+" : "+data.players[p];

players.appendChild(div);

}


bets.innerHTML="";

for(let p in data.bets){

const div=document.createElement("div");

div.textContent=
p+" (BET "+data.bets[p]+")";

const btn=document.createElement("button");

btn.textContent="勝者";

btn.onclick=()=>{

fetch("/winner",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({name:p})
});

};

div.appendChild(btn);

bets.appendChild(div);

}

});

}


function toggleBet(){

fetch("/bet/toggle",{
method:"POST"
});

}


function resetGame(){

fetch("/reset",{
method:"POST"
});

}


setInterval(loadState,1000);

</script>

</body>
</html>
